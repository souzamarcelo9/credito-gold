version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: creditogold_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       creditogold
      POSTGRES_USER:     creditogold
      POSTGRES_PASSWORD: creditogold_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creditogold -d creditogold"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Adminer — interface web para visualizar o banco (opcional)
  adminer:
    image: adminer:latest
    container_name: creditogold_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
